<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Arena // Season 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --surface: #0f0f0f;
            --surface2: #161616;
            --border: #222;
            --border-light: #2e2e2e;
            --white: #f2f0eb;
            --muted: #666;
            --gold: #c9a84c;
            --silver: #b0b0c0;
            --bronze: #b87840;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Header flush to top */
        .header {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            padding: 0px 30px 40px; 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .header-eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            color: var(--gold);
            text-transform: uppercase;
            margin-top: 15px; /* Slight breathing room from browser edge */
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-eyebrow::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 1px;
            background: var(--gold);
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 14vw, 9rem);
            line-height: 0.88;
            letter-spacing: 0.02em;
            color: var(--white);
        }

        h1 span {
            display: block;
            -webkit-text-stroke: 1px var(--gold);
            color: transparent;
            font-size: clamp(2.5rem, 9vw, 5.5rem);
        }

        .lb-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            padding: 0 30px 80px;
        }

        .lb-head {
            display: grid;
            grid-template-columns: 56px 1fr 130px 90px;
            padding: 0 20px 12px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 4px;
        }

        .lb-head span {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.25em;
            color: var(--white);
            text-transform: uppercase;
        }

        .lb-head span:nth-child(2) { padding-left: 8px; }
        .lb-head span:nth-child(3), .lb-head span:nth-child(4) { text-align: center; }

        .lb-row {
            display: grid;
            grid-template-columns: 56px 1fr 130px 90px;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
            transition: background 0.15s ease;
        }

        /* Rank Overlays - Restored from Reference */
        .lb-row.rank-1 { background: linear-gradient(90deg, rgba(201,168,76,0.08) 0%, transparent 60%); }
        .lb-row.rank-2 { background: linear-gradient(90deg, rgba(176,176,192,0.06) 0%, transparent 60%); }
        .lb-row.rank-3 { background: linear-gradient(90deg, rgba(184,120,64,0.06) 0%, transparent 60%); }

        .lb-row.rank-1::before, .lb-row.rank-2::before, .lb-row.rank-3::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 2px;
            border-radius: 1px;
        }
        .lb-row.rank-1::before { background: var(--gold); }
        .lb-row.rank-2::before { background: var(--silver); }
        .lb-row.rank-3::before { background: var(--bronze); }

        .pos {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            text-align: center;
        }

        .lb-row.rank-1 .pos { color: var(--gold); }
        .lb-row.rank-2 .pos { color: var(--silver); }
        .lb-row.rank-3 .pos { color: var(--bronze); }

        .name {
            font-weight: 700;
            font-size: 1.05rem;
            text-transform: uppercase;
            color: var(--white);
        }

        @keyframes gold-sweep {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .lb-row.rank-1 .name {
            background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gold-sweep 3.5s linear infinite;
        }

        .lb-row.rank-2 .name { color: #d8d8e0; }
        .lb-row.rank-3 .name { color: #d8a070; }

        .rating-col { font-family: 'DM Mono', monospace; text-align: center; color: var(--white); font-size: 0.9rem;}
        .rating-label { display: block; font-size: 0.58rem; color: var(--muted); margin-top: 1px; letter-spacing: 0.2em; }

        .rank-col { display: flex; align-items: center; justify-content: center; }
        .emblem { width: 36px; height: 36px; object-fit: contain; }

        .lb-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Player count style update: Faded like RP label */
        #player-count {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .refresh-bar-wrap { width: 60px; height: 2px; background: var(--border-light); overflow: hidden; }
        .refresh-bar { height: 100%; background: var(--gold); transition: width 1s linear; }

        @media (max-width: 600px) {
            .lb-head, .lb-row { grid-template-columns: 44px 1fr 100px 60px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-eyebrow">Season 1 &nbsp;·&nbsp; Leaderboard</div>
        <h1>Archive<span>Arena</span></h1>
    </header>

    <main class="lb-wrap">
        <div class="lb-head">
            <span>#</span>
            <span>Player</span>
            <span>Rating</span>
            <span>Rank</span>
        </div>
        <div id="lb-content"></div>
        <div class="lb-footer">
            <span id="player-count">—</span>
            <div style="display:flex; align-items:center; gap:6px; font-family:'DM Mono'; font-size:0.62rem; color:var(--muted); text-transform: uppercase;">
                <span>Refreshes in</span>
                <div class="refresh-bar-wrap"><div class="refresh-bar" id="refresh-bar" style="width:100%"></div></div>
                <span id="countdown">60s</span>
            </div>
        </div>
    </main>

    <script>
    const API_URL = "https://arena-tracker-agent-production.up.railway.app/api/leaderboard";
    const EMBLEMS = {
        diamond:  "https://cdn.discordapp.com/emojis/1477427100666433572.png",
        platinum: "https://cdn.discordapp.com/emojis/1477427675067842588.png",
        gold:     "https://cdn.discordapp.com/emojis/1477426026945577000.png",
        silver:   "https://cdn.discordapp.com/emojis/1477421174249099416.png",
        bronze:   "https://cdn.discordapp.com/emojis/1476994147935322265.png"
    };

    function getRankLabel(points) {
        if (points >= 1800) return 'diamond';
        if (points >= 1600) return 'platinum';
        if (points >= 1400) return 'gold';
        if (points >= 1200) return 'silver';
        return 'bronze';
    }

    async function syncLeaderboard() {
        const container = document.getElementById('lb-content');
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            data.sort((a, b) => b.points - a.points);

            container.innerHTML = data.map((p, i) => {
                const rankKey = getRankLabel(p.points);
                // logic to apply rank-1, rank-2, rank-3 classes for the overlays
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                return `
                    <div class="lb-row ${rankClass}">
                        <span class="pos">${String(i + 1).padStart(2, '0')}</span>
                        <div style="padding-left:8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                            <span class="name">${p.name}</span>
                        </div>
                        <div class="rating-col">
                            <span>${p.points.toLocaleString()}</span>
                            <span class="rating-label">RP</span>
                        </div>
                        <div class="rank-col">
                            <img src="${EMBLEMS[rankKey]}" class="emblem">
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('player-count').textContent = data.length + ' players enlisted';
            startCountdown();
        } catch (err) {
            container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--muted); font-family:'DM Mono'; font-size: 0.7rem;">SYSTEM OFFLINE</div>`;
        }
    }

    let timer;
    function startCountdown() {
        let left = 60;
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            left--;
            document.getElementById('countdown').textContent = left + 's';
            document.getElementById('refresh-bar').style.width = (left / 60 * 100) + '%';
            if (left <= 0) clearInterval(timer);
        }, 1000);
    }

    syncLeaderboard();
    setInterval(syncLeaderboard, 60000);
    </script>
</body>
</html>
