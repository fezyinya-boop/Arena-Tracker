<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Arena // Season 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060608;
            --surface: #0e0e12;
            --surface2: #14141a;
            --border: #1e1e26;
            --border-light: #2a2a36;
            --white: #f0ede8;
            --muted: #55556a;
            --gold: #c9a84c;
            --gold-bright: #f5e08a;
            --silver: #a8a8c0;
            --bronze: #b87840;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* BACKGROUND ATMOSPHERE */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 100;
        }

        .bg-glow {
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 500px;
            background: radial-gradient(ellipse at 50% 30%, rgba(201,168,76,0.07) 0%, rgba(100,80,200,0.04) 40%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* HEADER - Removed top padding to eliminate black space at browser top */
        .header {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            padding: 0 30px 0; 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .header-eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.32em;
            color: var(--gold);
            text-transform: uppercase;
            margin-top: 18px; /* Standard offset from top edge */
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-eyebrow::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 1px;
            background: var(--gold);
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 14vw, 9rem);
            line-height: 0.82;
            letter-spacing: 0.02em;
            color: var(--white);
            text-transform: uppercase;
            margin-top: 15px; 
            margin-bottom: 15px; /* Reduced to pull leaderboard up */
        }

        h1 span {
            display: block;
            -webkit-text-stroke: 1px var(--gold);
            color: transparent;
            font-size: clamp(4rem, 14vw, 9rem);
            margin-top: 12px; 
        }

        .header-sep {
            width: 100%;
            margin-top: 15px; /* Reduced to pull leaderboard up */
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-sep-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold) 0%, var(--border) 60%, transparent 100%);
        }

        .header-sep-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* LEADERBOARD */
        .lb-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            padding: 0 30px 80px;
        }

        .lb-head {
            display: grid;
            grid-template-columns: 56px 1fr 130px 90px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .lb-head span {
            font-family: 'DM Mono', monospace;
            font-size: 0.58rem;
            font-weight: 500;
            letter-spacing: 0.28em;
            color: var(--white);
            text-transform: uppercase;
        }

        .lb-head span:nth-child(2) { padding-left: 8px; }
        .lb-head span:nth-child(3), .lb-head span:nth-child(4) { text-align: center; }

        .lb-row {
            display: grid;
            grid-template-columns: 56px 1fr 130px 90px;
            align-items: center;
            padding: 13px 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
            transition: background 0.18s ease;
        }

        .lb-row:hover { background: var(--surface2); }

        .lb-row.rank-1 { background: linear-gradient(90deg, rgba(201,168,76,0.09) 0%, transparent 55%); }
        .lb-row.rank-2 { background: linear-gradient(90deg, rgba(168,168,192,0.06) 0%, transparent 55%); }
        .lb-row.rank-3 { background: linear-gradient(90deg, rgba(184,120,64,0.07) 0%, transparent 55%); }

        .lb-row.rank-1::before, .lb-row.rank-2::before, .lb-row.rank-3::before {
            content: '';
            position: absolute;
            left: 0; top: 18%; bottom: 18%;
            width: 2px;
            border-radius: 2px;
        }
        .lb-row.rank-1::before { background: var(--gold); }
        .lb-row.rank-2::before { background: var(--silver); }
        .lb-row.rank-3::before { background: var(--bronze); }

        .pos-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pos { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }
        .pos-emoji { font-size: 1.1rem; line-height: 1; margin-bottom: 2px; }

        .lb-row.rank-1 .pos { color: var(--gold); }
        .lb-row.rank-2 .pos { color: var(--silver); }
        .lb-row.rank-3 .pos { color: var(--bronze); }

        .name {
            font-weight: 700;
            font-size: 1.05rem;
            text-transform: uppercase;
            color: var(--white);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @keyframes gold-sweep {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .lb-row.rank-1 .name {
            background: linear-gradient(90deg, #a06820, #fcf6ba, #c9a84c, #fcf6ba, #a06820);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gold-sweep 4s linear infinite;
        }

        .rating-col { font-family: 'DM Mono', monospace; text-align: center; color: var(--white); font-size: 0.88rem; }
        .rating-label { display: block; font-size: 0.55rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.25em; }

        .rank-col { display: flex; align-items: center; justify-content: center; }
        .emblem { width: 34px; height: 34px; object-fit: contain; transition: transform 0.2s; }
        .lb-row:hover .emblem { transform: scale(1.12); }

        .lb-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-left { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
        .footer-right { display: flex; align-items: center; gap: 8px; font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
        .refresh-bar-wrap { width: 50px; height: 2px; background: var(--border); overflow: hidden; }
        .refresh-bar { height: 100%; background: var(--gold); transition: width 1s linear; }

        @media (max-width: 600px) {
            .lb-head, .lb-row { grid-template-columns: 48px 1fr 90px 52px; }
            h1 { font-size: clamp(3.2rem, 14vw, 5rem); margin-bottom: 10px; }
            h1 span { font-size: clamp(3.2rem, 14vw, 5rem); margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header class="header">
        <div class="header-eyebrow">Season 1 &nbsp;·&nbsp; Leaderboard</div>
        <h1>Archive<span>Arena</span></h1>
        <div class="header-sep">
            <div class="header-sep-line"></div>
            <span class="header-sep-label">Rankings</span>
        </div>
    </header>

    <main class="lb-wrap">
        <div class="lb-head">
            <span>#</span>
            <span>Player</span>
            <span>Rating</span>
            <span>Rank</span>
        </div>
        <div id="lb-content"></div>
        <div class="lb-footer">
            <span class="footer-left" id="player-count">—</span>
            <div class="footer-right">
                <span>Refreshes in</span>
                <div class="refresh-bar-wrap">
                    <div class="refresh-bar" id="refresh-bar" style="width:100%"></div>
                </div>
                <span id="countdown">60s</span>
            </div>
        </div>
    </main>

    <script>
    const API_URL = "https://arena-tracker-agent-production.up.railway.app/api/leaderboard";
    const EMBLEMS = {
        diamond:  "https://cdn.discordapp.com/emojis/1477427100666433572.png",
        platinum: "https://cdn.discordapp.com/emojis/1477427675067842588.png",
        gold:     "https://cdn.discordapp.com/emojis/1477426026945577000.png",
        silver:   "https://cdn.discordapp.com/emojis/1477421174249099416.png",
        bronze:   "https://cdn.discordapp.com/emojis/1476994147935322265.png"
    };

    function getRank(points) {
        if (points >= 1800) return 'diamond';
        if (points >= 1600) return 'platinum';
        if (points >= 1400) return 'gold';
        if (points >= 1200) return 'silver';
        return 'bronze';
    }

    async function syncLeaderboard() {
        const container = document.getElementById('lb-content');
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            data.sort((a, b) => b.points - a.points);

            container.innerHTML = data.map((p, i) => {
                const rankKey = getRank(p.points);
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                const medals = ["🥇", "🥈", "🥉"];

                return `
                    <div class="lb-row ${rankClass}">
                        <div class="pos-cell">
                            ${i < 3 ? `<span class="pos-emoji">${medals[i]}</span>` : ''}
                            <span class="pos">${String(i + 1).padStart(2, '0')}</span>
                        </div>
                        <div style="padding-left:8px; overflow:hidden;"><span class="name">${p.name}</span></div>
                        <div class="rating-col">
                            <span>${p.points.toLocaleString()}</span>
                            <span class="rating-label">RP</span>
                        </div>
                        <div class="rank-col">
                            <img src="${EMBLEMS[rankKey]}" class="emblem">
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('player-count').textContent = data.length + ' players enlisted';
            startCountdown();
        } catch (err) {
            container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--muted); font-family:'DM Mono';">SYSTEM OFFLINE</div>`;
        }
    }

    let timer;
    function startCountdown() {
        let left = 60;
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            left--;
            document.getElementById('countdown').textContent = left + 's';
            document.getElementById('refresh-bar').style.width = (left / 60 * 100) + '%';
            if (left <= 0) syncLeaderboard();
        }, 1000);
    }

    syncLeaderboard();
    </script>
</body>
</html>
